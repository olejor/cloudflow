syntax = "proto3";

package cloudflow.v1;

// VisibilityLevel describes how much of the original traffic CloudFlow could
// directly observe. DHCPv4/DHCPv6 packet events should normally use
// VISIBILITY_PACKET_PAYLOAD because the protocol payload is unencrypted.
enum VisibilityLevel {
  VISIBILITY_LEVEL_UNSPECIFIED = 0;
  VISIBILITY_PACKET_METADATA = 1;
  VISIBILITY_HANDSHAKE_METADATA = 2;
  VISIBILITY_CLASSIFIED_FLOW = 3;
  VISIBILITY_PACKET_PAYLOAD = 4;
  VISIBILITY_DECRYPTED_PAYLOAD = 5;
  VISIBILITY_ENDPOINT_OBSERVED = 6;
}

// ObservationConfidence distinguishes directly observed wire facts from
// derived or inferred values.
enum ObservationConfidence {
  OBSERVATION_CONFIDENCE_UNSPECIFIED = 0;
  OBSERVATION_CONFIDENCE_OBSERVED = 1;
  OBSERVATION_CONFIDENCE_DERIVED = 2;
  OBSERVATION_CONFIDENCE_INFERRED = 3;
}

message EventEnvelope {
  string event_id = 1;
  uint32 schema_version = 2;

  // Examples: "dhcpv4", "dhcpv6".
  string source_type = 3;
  string source_host = 4;
  string source_instance = 5;
  string capture_interface = 6;

  // Examples: "rxring", "af_packet", "pcap".
  string observation_method = 7;

  // Canonical event time from the capture path, as Unix epoch nanoseconds.
  int64 observed_time_unix_nano = 8;

  // Time CloudFlow created/enqueued the event, as Unix epoch nanoseconds.
  int64 ingest_time_unix_nano = 9;

  // Examples: "dhcpv4.packet.observed", "dhcpv4.lease.derived".
  string event_type = 10;

  VisibilityLevel visibility = 11;
  ObservationConfidence confidence = 12;

  // Fully qualified protobuf message name of the payload.
  // Example: "cloudflow.v1.DhcpV4PacketEvent".
  string payload_schema = 13;

  // Redis stream where the event was written, when known.
  // Example: "cloudflow:v1:wire:dhcpv4".
  string stream_name = 14;
}

enum CaptureDirection {
  CAPTURE_DIRECTION_UNSPECIFIED = 0;
  CAPTURE_DIRECTION_INGRESS = 1;
  CAPTURE_DIRECTION_EGRESS = 2;
  CAPTURE_DIRECTION_UNKNOWN = 3;
}

// Generic packet/capture metadata shared by all protocol-specific events.
// Keep protocol parsing details out of this type unless they describe common
// link/network/transport metadata. DHCP, DNS, TLS, QUIC, and future protocol
// events should add their own decoded payload messages instead of expanding this
// message with protocol-specific fields.
message PacketObservation {
  // Packet timestamp from capture path, as Unix epoch nanoseconds.
  int64 observed_time_unix_nano = 1;

  CaptureDirection capture_direction = 2;

  LinkLayerObservation link = 3;
  NetworkLayerObservation network = 4;
  TransportLayerObservation transport = 5;

  uint64 packet_len = 20;
  uint64 captured_len = 21;
  bool truncated = 22;

  uint32 rx_queue = 30;
  uint64 rx_hash = 31;

  // Optional monotonically increasing counter from the collector, if available.
  uint64 capture_sequence = 32;

  // Optional drop counter value sampled near this packet, if available.
  uint64 capture_drop_counter = 33;
}

message LinkLayerObservation {
  string src_mac = 1;
  string dst_mac = 2;
  repeated uint32 vlan_ids = 3;

  // Ethernet EtherType, when Ethernet framing is present.
  // Examples: IPv4=0x0800, IPv6=0x86dd, ARP=0x0806.
  uint32 ethertype = 4;
}

message NetworkLayerObservation {
  enum NetworkProtocol {
    NETWORK_PROTOCOL_UNSPECIFIED = 0;
    NETWORK_PROTOCOL_IPV4 = 1;
    NETWORK_PROTOCOL_IPV6 = 2;
    NETWORK_PROTOCOL_ARP = 3;
    NETWORK_PROTOCOL_OTHER = 255;
  }

  NetworkProtocol protocol = 1;
  string src_ip = 2;
  string dst_ip = 3;

  // IPv4 protocol or IPv6 next-header value when applicable.
  // Examples: TCP=6, UDP=17, ICMPv6=58.
  uint32 next_header = 4;

  uint32 ttl_or_hop_limit = 5;
  uint32 dscp = 6;
  uint32 ecn = 7;

  bool fragmented = 8;
  uint32 fragment_offset = 9;
}

message TransportLayerObservation {
  enum TransportProtocol {
    TRANSPORT_PROTOCOL_UNSPECIFIED = 0;
    TRANSPORT_PROTOCOL_TCP = 1;
    TRANSPORT_PROTOCOL_UDP = 2;
    TRANSPORT_PROTOCOL_ICMP = 3;
    TRANSPORT_PROTOCOL_ICMPV6 = 4;
    TRANSPORT_PROTOCOL_SCTP = 5;
    TRANSPORT_PROTOCOL_OTHER = 255;
  }

  TransportProtocol protocol = 1;

  // Numeric IP protocol / next-header value when applicable.
  // Examples: TCP=6, UDP=17, ICMPv6=58.
  uint32 ip_protocol_number = 2;

  // Meaningful for TCP, UDP, SCTP, QUIC-over-UDP, etc.
  uint32 src_port = 3;
  uint32 dst_port = 4;

  // Best-effort higher-level protocol detections. For example, QUIC should
  // normally still have protocol=UDP but may include detected_protocols=["quic"].
  repeated string detected_protocols = 5;

  oneof details {
    TcpObservation tcp = 10;
    UdpObservation udp = 11;
    IcmpObservation icmp = 12;
    QuicObservation quic = 13;
  }
}

message TcpObservation {
  // TCP flags as a bitmask in wire order. Interpretation belongs in code/docs.
  uint32 flags = 1;
  uint32 window_size = 2;
  uint32 payload_len = 3;
  bool checksum_validated = 4;
}

message UdpObservation {
  uint32 length = 1;
  bool checksum_present = 2;
  bool checksum_validated = 3;
}

message IcmpObservation {
  uint32 type = 1;
  uint32 code = 2;
}

// QUIC metadata is optional best-effort parsed metadata layered above UDP. The
// underlying packet transport should still be represented as UDP in
// TransportLayerObservation.protocol and ip_protocol_number.
message QuicObservation {
  bool quic_detected = 1;
  string version = 2;
  bytes destination_connection_id = 3;
  bytes source_connection_id = 4;
  bool initial_packet = 5;
  string alpn = 6;
  string sni = 7;
}

message ParserWarning {
  string code = 1;
  string message = 2;
  string field_path = 3;
  bytes raw_context = 4;
}
