# Splunk metrics sink -> fake HEC metrics endpoint (real HTTP delivery).
# A second consumer group (sink-splunk-metrics) over the same wire streams.
service:
  name: cloudflow-sink-splunk-metrics
  consumer_name: harness-splunk-metrics-01

redis:
  endpoints:
    - redis:6379
  streams:
    - cloudflow:v1:wire:dhcpv4
    - cloudflow:v1:wire:dhcpv6
    - cloudflow:v1:wire:dns
  consumer_group: sink-splunk-metrics
  read_count: 200
  block_ms: 200
  deadletter_stream: cloudflow:v1:deadletter:sink-splunk-metrics

splunk:
  hec_url: http://hecfake:8088
  hec_path: /services/collector
  hec_token_env: CF_HARNESS_HEC_TOKEN
  index: ""
  metrics_index: cloudflow_metrics
  batch_size: 500
  flush_interval_ms: 200
  request_timeout_ms: 2000
  tls_verify: false
