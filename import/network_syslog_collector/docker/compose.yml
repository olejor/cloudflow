services:
  redis-cluster:
    image: 'redis:latest'
    command: redis-cli --cluster create 172.20.0.31:7000 172.20.0.32:7001 172.20.0.33:7002 172.20.0.34:7003 172.20.0.35:7004 172.20.0.36:7005 172.20.0.37:7006 172.20.0.38:7007 --cluster-yes
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.30
    depends_on:
      - redis-node0
      - redis-node1
      - redis-node2
      - redis-node3
      - redis-node4
      - redis-node5
      - redis-node6
      - redis-node7
  redis-node0:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7000
    ports:
      - '7000:7000'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.31
  redis-node1:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7001
    ports:
      - '7001:7001'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.32
  redis-node2:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7002
    ports:
      - '7002:7002'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.33
  redis-node3:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7003
    ports:
      - '7003:7003'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.34
  redis-node4:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7004
    ports:
      - '7004:7004'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.35
  redis-node5:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7005
    ports:
      - '7005:7005'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.36
  redis-node6:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7006
    ports:
      - '7006:7006'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.37
  redis-node7:
    image: 'redis:latest'
    command: redis-server /usr/local/etc/redis/redis.conf --port 7007
    ports:
      - '7007:7007'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      redis_subnet:
        ipv4_address: 172.20.0.38
networks:
  redis_subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
